<!DOCTYPE html>
<html>
<head>
<title>Auto Video Site</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: #1f1f1f;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  background: #2a2a2a;
}

#player {
  width: 100%;
  height: 420px;
  border: none;
  display: none;
}
</style>
</head>

<body>

<h1>My Auto Video Site</h1>

<iframe id="player"></iframe>

<div id="grid"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1oXbsg82A3mdyeegN2OAUEehIugcRkFtXUh-iwp98UAg/gviz/tq?tqx=out:csv&sheet=Videos";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const grid = document.getElementById("grid");

    rows.forEach(row => {
      const cols = row.split(",");

      const title = cols[0];
      const url = cols[1];

      if (!title || !url) return;

      const card = document.createElement("div");
      card.className = "card";
      card.innerText = "▶ " + title;

      card.onclick = () => {
        document.getElementById("player").style.display = "block";
        document.getElementById("player").src = url;
      };

      grid.appendChild(card);
    });
  });
</script>

</body>
</html>
