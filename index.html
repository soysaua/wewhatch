<!DOCTYPE html>
<html>
<head>
<title>wewatch</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: #1f1f1f;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  background: #2a2a2a;
}

#player {
  width: 100%;
  height: 420px;
  border: none;
  display: none;
}
</style>
</head>

<body>

<h1>wewatch</h1>

<iframe id="player"></iframe>

<div id="grid"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1oXbsg82A3mdyeegN2OAUEehIugcRkFtXUh-iwp98UAg/gviz/tq?tqx=out:csv&sheet=Videos";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").slice(1);
    const grid = document.getElementById("grid");

    rows.forEach(row => {
      const cols = row.split(",");

      const time = cols[0]?.trim();
      const email = cols[1]?.trim();
      const title = cols[2]?.trim();
      let url = cols[3]?.trim();

      if (!title || !url) return;

      // fix Google Drive links automatically
      url = url.replace("/view", "/preview");

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = "▶ " + title;

      card.onclick = () => {
        const player = document.getElementById("player");
        player.style.display = "block";
        player.src = url;
      };

      grid.appendChild(card);
    });
  });
</script>

</body>
</html>
