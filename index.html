<!DOCTYPE html>
<html>
<head>
<title>My Video Site</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: #1f1f1f;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  background: #2a2a2a;
}

#player {
  width: 100%;
  height: 420px;
  display: none;
}
</style>
</head>

<body>

<h1>My Video Site</h1>

<iframe id="player"></iframe>

<div id="grid">

  <div class="card" onclick="play('https://www.youtube.com/embed/dQw4w9WgXcQ')">
    ▶ Example Video
  </div>

</div>

<script>
function play(url){
  document.getElementById('player').style.display = 'block';
  document.getElementById('player').src = url;
}
</script>

</body>
</html>
